<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Push Debug</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px;
            background: #f5f5f5;
        }
        .debug-box {
            background: black;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }
        .error { color: #f00; }
        .warn { color: #ff0; }
        .info { color: #0ff; }
        button {
            background: #977141;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px 5px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:active {
            background: #7f5f35;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: white;
        }
    </style>
</head>
<body>
    <h1>📱 Mobile Push Notifications Debug</h1>
    
    <div class="status">
        <h3>Status:</h3>
        <p id="browser-info">Loading...</p>
        <p id="sw-status">Service Worker: Checking...</p>
        <p id="push-status">Push Support: Checking...</p>
        <p id="permission-status">Permission: Checking...</p>
    </div>
    
    <button onclick="testPushSubscription()">🔔 Test Push Subscription</button>
    <button onclick="clearLogs()">🗑️ Clear Logs</button>
    
    <h3>Debug Logs:</h3>
    <div class="debug-box" id="debug-logs"></div>
    
    <script>
        let logs = [];
        
        function log(message, type = 'log') {
            const colors = {
                log: '#0f0',
                error: 'error',
                warn: 'warn',
                info: 'info'
            };
            
            const time = new Date().toLocaleTimeString();
            logs.push({ time, message, type: colors[type] });
            updateLogs();
        }
        
        function updateLogs() {
            const container = document.getElementById('debug-logs');
            container.innerHTML = logs.map(l => 
                `<div class="log-entry ${l.type}">[${l.time}] ${l.message}</div>`
            ).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function clearLogs() {
            logs = [];
            updateLogs();
        }
        
        // Check browser capabilities
        function checkBrowser() {
            const info = document.getElementById('browser-info');
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            info.innerHTML = `
                Platform: ${navigator.platform}<br>
                Mobile: ${isMobile ? 'Yes' : 'No'}<br>
                User Agent: ${navigator.userAgent.substring(0, 80)}...
            `;
            log('Browser: ' + navigator.userAgent);
            
            // Service Worker
            if ('serviceWorker' in navigator) {
                document.getElementById('sw-status').innerHTML = 'Service Worker: ✅ Supported';
                log('Service Worker: Supported');
            } else {
                document.getElementById('sw-status').innerHTML = 'Service Worker: ❌ Not Supported';
                log('Service Worker: NOT SUPPORTED', 'error');
            }
            
            // Push
            if ('PushManager' in window) {
                document.getElementById('push-status').innerHTML = 'Push Support: ✅ Supported';
                log('Push: Supported');
            } else {
                document.getElementById('push-status').innerHTML = 'Push Support: ❌ Not Supported';
                log('Push: NOT SUPPORTED', 'error');
            }
            
            // Permission
            if ('Notification' in window) {
                const perm = Notification.permission;
                document.getElementById('permission-status').innerHTML = 'Permission: ' + perm;
                log('Notification Permission: ' + perm);
            }
        }
        
        async function testPushSubscription() {
            log('=== Starting Push Subscription Test ===', 'info');
            
            try {
                // Check support
                if (!('serviceWorker' in navigator)) {
                    throw new Error('Service Worker not supported');
                }
                
                if (!('PushManager' in window)) {
                    throw new Error('Push notifications not supported');
                }
                
                log('Registering service worker...');
                const registration = await navigator.serviceWorker.register('/service-worker.js', { scope: '/' });
                log('Service worker registered');
                
                log('Waiting for service worker to be ready...');
                const reg = await navigator.serviceWorker.ready;
                log('Service worker ready');
                
                log('Checking existing subscription...');
                const existingSub = await reg.pushManager.getSubscription();
                
                if (existingSub) {
                    log('Already subscribed: ' + existingSub.endpoint.substring(0, 50) + '...', 'info');
                    alert('Already subscribed!');
                    return;
                }
                
                log('Requesting notification permission...');
                const permission = await Notification.requestPermission();
                log('Permission result: ' + permission);
                
                if (permission !== 'granted') {
                    log('Permission denied by user', 'error');
                    alert('Permission denied!');
                    return;
                }
                
                log('Fetching VAPID key...');
                const response = await fetch('/inc/ajax/get_vapid_key.php');
                const data = await response.json();
                log('VAPID key received: ' + data.publicKey.substring(0, 20) + '...');
                
                log('Converting VAPID key...');
                const applicationServerKey = urlBase64ToUint8Array(data.publicKey);
                log('VAPID key converted');
                
                log('Subscribing to push...');
                const subscription = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: applicationServerKey
                });
                log('Subscription created: ' + subscription.endpoint.substring(0, 50) + '...', 'info');
                
                log('Saving subscription to server...');
                const saveResponse = await fetch('/inc/ajax/save_push_subscription.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(subscription)
                });
                
                const saveData = await saveResponse.json();
                log('Server response: ' + JSON.stringify(saveData));
                
                if (saveData.success) {
                    log('=== SUCCESS! Push notifications enabled ===', 'info');
                    alert('Success! Push notifications enabled.');
                } else {
                    log('Server save failed: ' + saveData.error, 'error');
                    alert('Server error: ' + saveData.error);
                }
                
            } catch (err) {
                log('ERROR: ' + err.message, 'error');
                log('Error stack: ' + err.stack, 'error');
                alert('Error: ' + err.message);
            }
        }
        
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding)
                .replace(/\-/g, '+')
                .replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
        
        // Run checks on load
        checkBrowser();
    </script>
</body>
</html>
